# This workflow will build Python packages on every commit.

name: Build gentooinstall

on: [ push, pull_request ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build installer
      - name: Build gentooinstall
        run: python -m build --wheel --no-isolation
      - name: Install gentooinstall
        run: python -m installer dist/*.whl
      - name: Smoke test CLI
        run: |
          gentooinstall --version
          python -m gentooinstall --script list
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gentooinstall
          path: dist/*
